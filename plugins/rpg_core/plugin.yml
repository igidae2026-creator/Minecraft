name: rpg_core
main: com.rpg.core.Main
version: 1.2.0
api-version: '1.20'
author: RPGNetwork
load: STARTUP
description: Core bootstrap, persistence, profile cache, and secure network runtime
commands:
  rpgprofile:
    usage: /rpgprofile
    permission: rpg.profile
  rpgtravel:
    usage: /rpgtravel <server>
    permission: rpg.travel
  rpgadmin:
    usage: /rpgadmin <item|gold|status> ...
    permission: rpg.admin
  play:
    usage: /play [route]
    permission: rpg.play
  return:
    usage: /return
    permission: rpg.return
  genres:
    usage: /genres
    permission: rpg.play
  party:
    usage: /party <info|invite|accept|leave|warp>
    permission: rpg.party
  prestige:
    usage: /prestige
    permission: rpg.profile
  streak:
    usage: /streak
    permission: rpg.profile
permissions:
  rpg.profile:
    default: true
  rpg.travel:
    default: true
  rpg.play:
    default: true
  rpg.return:
    default: true
  rpg.party:
    default: true
  rpg.admin:
    default: op
