name: guild_system
main: com.rpg.guild.Main
version: 1.2.0
api-version: '1.20'
author: RPGNetwork
depend:
- rpg_core
softdepend:
- economy_engine
description: Guild creation, invite, membership, and bank runtime
commands:
  guild:
    usage: /guild <info|create|invite|join|leave|chat|rank|deposit>
    permission: rpg.guild
permissions:
  rpg.guild:
    default: true
