loop:
  enabled: true
  decision_cooldown_seconds: 300
  min_status_samples: 1
  max_adjustments_per_pass: 6
soak:
  required_observations: 2
  max_regression_completion_rate: 0.08
  max_regression_event_join_rate: 0.2
  max_risk_increase: 6.0
  max_pressure_increase: 0.12
convergence:
  repeated_apply_window: 2
final_threshold:
  required_steady_noop_streak: 12
  operational_steady_streak: 4
  autonomy_steady_streak: 6
supervisor:
  enabled: true
  interval_seconds: 300
  mode: hybrid
  synthetic_cycles: 2
  matrix_every_n_loops: 6
quality_targets:
  completion_rate_floor: 0.55
  event_join_floor: 1.25
  queue_size_warning: 25
  pressure_warning: 0.72
  routing_latency_warning_ms: 80.0
  economy_inflation_ratio_warning: 1.35
  exploit_incident_warning: 2.0
  abnormal_currency_warning: 1800.0
controls:
  fail_closed_on_conflict: true
  bounded_adjustments_only: true
  append_only_decisions: true
surfaces:
  decisions_dir: runtime_data/autonomy/decisions
  backups_dir: runtime_data/autonomy/backups
  policy_exports_dir: runtime_data/policies
  knowledge_exports_dir: runtime_data/knowledge
parameters:
  adaptive_rules.matchmaking.high_queue_seconds:
    min: 25
    max: 75
    step: 5
  adaptive_rules.events.low_join_rate:
    min: 0.20
    max: 0.60
    step: 0.05
  adaptive_rules.rewards.low_completion_rate:
    min: 0.35
    max: 0.75
    step: 0.05
  runtime_monitor.scaling.density_scale_trigger:
    min: 45
    max: 75
    step: 2
  pressure.controls.noncritical_spawn_suppression_threshold:
    min: 0.60
    max: 0.90
    step: 0.05
  pressure.controls.queue_admission_threshold:
    min: 0.75
    max: 0.92
    step: 0.02
  economy.market_tax:
    min: 0.05
    max: 0.15
    step: 0.01
  runtime_monitor.exploit_detection.abnormal_currency_gain:
    min: 1000
    max: 5000
    step: 250
  runtime_monitor.exploit_detection.duplicate_reward_spike:
    min: 1
    max: 8
    step: 1
