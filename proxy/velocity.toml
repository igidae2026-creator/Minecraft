# Generated by ops/render_network.py
config-version = "2.7"
bind = "0.0.0.0:25565"
motd = "<gold>RPG Network</gold> <gray>- Production Baseline</gray>"
show-max-players = 500
online-mode = true
force-key-authentication = true
prevent-client-proxy-connections = true
player-info-forwarding-mode = "MODERN"
forwarding-secret-file = "forwarding.secret"
announce-forge = false
kick-existing-players = true
ping-passthrough = "DESCRIPTION"
sample-players-in-ping = false
enable-player-address-logging = false

[servers]
lobby = "127.0.0.1:25566"
rpg_world = "127.0.0.1:25567"
dungeons = "127.0.0.1:25568"
boss_world = "127.0.0.1:25569"
events = "127.0.0.1:25570"
try = [
  "lobby",
  "rpg_world",
]

[forced-hosts]

[advanced]
compression-threshold = 256
compression-level = -1
login-ratelimit = 3000
connection-timeout = 5000
read-timeout = 30000
haproxy-protocol = false
tcp-fast-open = false
bungee-plugin-message-channel = true
show-ping-requests = false
failover-on-unexpected-server-disconnect = true
announce-proxy-commands = false
log-command-executions = true
log-player-connections = true
accepts-transfers = false
enable-reuse-port = true
command-rate-limit = 75
forward-commands-if-rate-limited = false
kick-after-rate-limited-commands = 5
tab-complete-rate-limit = 25
kick-after-rate-limited-tab-completes = 10

[query]
enabled = false
port = 25565
map = "RPG-Network"
show_plugins = false
